_base_:
  - ../base.yaml
  - ../model/convlstm_unet.yaml
  - ../data/vil_12in_12out.yaml

outputs:
  run_name: baseline_desktop

training:
  epochs: 15
  batch_size: 1
  num_workers: 2
  lr: 0.0001
  weight_decay: 0.0001
  grad_accum: 4
  amp: true
  clip_grad_norm: 1.0
  optimizer: adamw
  scheduler: reduce_on_plateau
  lr_factor: 0.5
  lr_patience: 2
  early_patience: 4
  min_delta: 1.0e-4
  loss:
    name: mae
    kwargs: {}
  use_all_data: false
  save_best_only: true
  log_every: 50

evaluation:
  compute_ssim: false
  compute_weighted_mae: false
