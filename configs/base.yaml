seed: 42

training:
  batch_size: 1
  num_workers: 0
  epochs: 6
  lr: 0.0001
  weight_decay: 0.0001
  grad_accum: 4
  amp: true
  clip_grad_norm: 1.0
  optimizer: adamw
  scheduler: reduce_on_plateau
  lr_factor: 0.5
  lr_patience: 2
  early_patience: null
  min_delta: 1.0e-6
  loss:
    name: mae
    kwargs: {}
  use_all_data: false
  save_best_only: true
  log_every: 50

evaluation:
  compute_ssim: false
  compute_weighted_mae: false
  weighted_mae:
    thresholds: [0.25, 0.5, 0.75]
    weights: [1.0, 2.0, 3.0, 4.0]

uncertainty:
  enabled: false
  n_samples: 10

outputs:
  run_name: baseline_reproduction
  root_dir: outputs
  checkpoints_dir: outputs/checkpoints
  metrics_dir: outputs/metrics
  figures_dir: outputs/figures
  predictions_dir: outputs/predictions
