seed: 42

data:
  h5_path: data/train.h5
  events_csv: data/events.csv
  index_csv: data/vil_events.csv
  repo_id: benmoseley/ese-dl-2025-26-group-project
  event_col: id
  event_type_col: event_type
  img_type_col: img_type
  dataset_key: vil
  tin: 12
  tout: 12
  stride: 1
  use_sliding_windows: true
  normalize_divisor: 255.0
  use_crops: false
  crop_size: 384
  expected_hw: [384, 384]
  test_frac: 0.30
  val_frac_of_train: 0.20

model:
  name: convlstm_unet
  base: 16
  bottleneck_ch: 128
  dropout_p: 0.0

training:
  batch_size: 1
  num_workers: 0
  epochs: 6
  lr: 0.0001
  weight_decay: 0.0001
  grad_accum: 4
  amp: true
  clip_grad_norm: 1.0
  optimizer: adamw
  scheduler: reduce_on_plateau
  lr_factor: 0.5
  lr_patience: 2
  early_patience: null
  min_delta: 1.0e-6
  loss:
    name: mae
    kwargs: {}
  use_all_data: false
  save_best_only: true
  log_every: 50

evaluation:
  compute_ssim: false
  compute_weighted_mae: false
  weighted_mae:
    thresholds: [0.25, 0.5, 0.75]
    weights: [1.0, 2.0, 3.0, 4.0]

uncertainty:
  enabled: false
  n_samples: 10

outputs:
  run_name: baseline_reproduction
  root_dir: outputs
  checkpoints_dir: outputs/checkpoints
  metrics_dir: outputs/metrics
  figures_dir: outputs/figures
  predictions_dir: outputs/predictions
